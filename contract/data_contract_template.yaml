# =============================================================================
# TwinCE DATA CONTRACT TEMPLATE v2.1  (DPPO/ESPR aligned)
# =============================================================================
#
# ONTOLOGY BASIS:
#   - DPPO  = Digital Product Passport Ontology (Linköping University, EU CIRPASS)
#             Central relation: (DigitalProductPassport)-[:DESCRIBES]->(Product)
#   - ESPR  = EU Regulation 2024/1781 — Ecodesign for Sustainable Products
#             DPP mandatory for covered product categories from 2027
#             12 Annex III data element categories must be accessible via DPP
#   - CEON  = Circular Economy Ontology Network
#   - GHG   = GHG Protocol (Scope 1/2/3 emissions)
#
# HOW TO USE:
#   1. Copy this file and rename: <PARTNER_CODE>_datacontract.yaml
#   2. Fill in all <PLACEHOLDERS> with partner-specific information
#   3. In "models" section:
#      - DELETE models the partner cannot send
#      - KEEP models the partner can send, adjust fields as needed
#      - ADD new models if the partner has data not listed here
#   4. For each model, list which fields are "required" (must be in every message)
#   5. In "consumers" section:
#      - TwinCE_Platform is always present (export_profile: full_internal)
#      - For each RECEIVER partner (e.g. a buyer): add a consumer block with
#        export_profile and required_fields for receiver-side validation
#   6. In "export_profile_definitions" section:
#      - Define which fields each profile includes per model
#      - full_internal: "*" means all fields
#      - customer_exchange_minimum: list only what the buyer legally needs
#   7. Send to partner for review before finalizing
#
# RULES:
#   - Every model MUST have: topic, description, type, kg_node, required, fields
#   - Use "fields" (NOT "columns")
#   - Every field MUST have: type, description
#   - kg_node = Neo4j node label → data goes to KG AND lakehouse
#   - kg_node = null             → data goes to lakehouse ONLY
#   - Do NOT translate "data contract" to German (keep English)
#
# KG NODE LABELS (DPPO/ESPR aligned):
#   Model                    kg_node                  Ontology
#   ──────────────────────   ──────────────────────── ─────────────────────────────
#   order                    Order                    CEON actorODP
#   product                  Product                  DPPO dpp-odp:Product
#   material                 Material                 CEON resource, MatOnto
#   material_composition     ChemicalProperty         DPPO dpp-comp (existing Neo4j label)
#   energy_consumption       MachineEnergyDaily       ISA95
#   emission_factor          EmissionFactor           GHG Protocol
#   scope1_fuel              Scope1FuelRecord         GHG Protocol Scope 1
#   scope2_electricity       Scope2ElectricityRecord  GHG Protocol Scope 2
#   scope3_material          Scope3MaterialRecord     GHG Protocol Scope 3 Cat.1
#   scope3_transport         Scope3TransportRecord    GHG Protocol Scope 3 Cat.4/9
#   pcf_aggregation          PCFAggregation           ISO 14067, Catena-X
#   digital_product_passport DigitalProductPassport   DPPO dpp-odp:DPP, ESPR Art. 9
#   data_carrier             DataCarrier              ESPR Article 9(1)(r)
#
# =============================================================================

dataContractSpecification: 1.1.0
id: <PARTNER_CODE>_data

info:
  title: <Partner Name> – Data Contract
  version: 1.0.0
  description: <What data is shared and why>
  owner: <Partner Organization Name>
  status: active
  created: <YYYY-MM-DD>
  contact:
    name: <Contact Person>
    email: <email@example.com>

# =============================================================================
# CONSUMERS — Who can access this data and under what conditions.
# The platform validates every incoming request against these policies.
# TwinCE_Platform is required; add more consumer blocks as needed.
# =============================================================================
consumers:
  TwinCE_Platform:
    description: >
      TwinCE platform services including analytics, sustainability dashboards,
      knowledge graph, data lakehouse, and circular economy insights.
    export_profile: full_internal          # receives all fields from all models
    allowed_purposes:
      - circular_economy_analysis
      - product_lifecycle_tracking
      - sustainability_reporting
      - research_demonstration
    allowed_topics:
      - <partner>_*
    data_retention_days: 730
    can_share_externally: false
    requires_audit: true
    max_data_size_mb: 500
    service_expectations:
      availability: 99%
      data_freshness: 24h
      update_frequency: real_time
      note: >
        Research project — best-effort service. Focus on data quality
        over strict availability guarantees.
    data_quality_requirements:
      min_completeness: 95
      min_accuracy: 98
      validation_required: true
      reject_invalid: true
      required_fields: []                  # platform accepts all fields including nullable
      note: >
        DATA QUALITY IS CRITICAL for research validity.
        Platform MUST validate all data before use and report quality
        issues to the partner within 24 hours.
    constraints:
      - type: rate_limit
        description: Maximum 1000 messages per minute
        value: 1000
        unit: messages/minute
      - type: no_raw_export
        description: No bulk export of raw data outside TwinCE platform
      - type: quality_monitoring
        description: Continuous monitoring of data quality metrics
        metrics:
          - completeness
          - accuracy
          - timeliness

  # ── BUYER PARTNER EXAMPLE ──────────────────────────────────────────────
  # Add one block per partner that should RECEIVE data from this contract.
  # The partner_id here must match the partner_id in the platform APIKeyManager.
  # <BUYER_PARTNER_ID>:
  #   description: <Company name and why they receive this data>
  #   export_profile: customer_exchange_minimum   # filtered view — only fields they need
  #   allowed_purposes:
  #     - supply_chain
  #     - quality_verification
  #   allowed_topics:
  #     - <partner>_dpp                           # typically only the DPP topic
  #   data_retention_days: 90
  #   can_share_externally: false
  #   requires_audit: true
  #   max_data_size_mb: 10
  #   data_quality_requirements:
  #     min_completeness: 85
  #     validation_required: true
  #     reject_invalid: false
  #     required_fields:                          # fields buyer MUST have for compliance
  #       - pcf_cradle_to_gate                    # needed for buyer's Scope 3 reporting
  #       - hazardous_substances                  # needed for REACH compliance
  #       - release_status                        # needed to confirm quality approval
  #   constraints:
  #     - type: non_commercial
  #       description: Supply chain use only, no resale of data

  # ── RESEARCH PARTNER EXAMPLE ───────────────────────────────────────────
  # Partner_Research:
  #   description: University or research partner for circular economy studies
  #   export_profile: public_dpp_view             # anonymized view
  #   allowed_purposes:
  #     - circular_economy_analysis
  #     - research_demonstration
  #   allowed_topics:
  #     - <partner>_dpp
  #   data_retention_days: 365
  #   can_share_externally: false
  #   requires_audit: true
  #   max_data_size_mb: 50
  #   data_quality_requirements:
  #     min_completeness: 85
  #     min_accuracy: 90
  #     validation_required: true
  #     reject_invalid: false
  #     required_fields: []
  #   constraints:
  #     - type: anonymization
  #       description: Must anonymize sensitive identifiers before use
  #     - type: non_commercial
  #       description: Academic research only, no commercial use

default_consumer_policy:
  description: Default policy for unlisted consumers — requires manual approval
  allowed_purposes:
    - research_demonstration
  data_retention_days: 90
  can_share_externally: false
  requires_audit: true
  max_data_size_mb: 10
  data_quality_requirements:
    min_completeness: 85
    min_accuracy: 90
    validation_required: true
  constraints:
    - type: manual_approval
      description: Requires explicit approval from data owner
      approval_contact: <email@example.com>
      approval_sla_days: 5

# =============================================================================
# EXPORT PROFILE DEFINITIONS
# Defines which fields each named profile includes, per model.
# Used by the platform InboxConsumer to filter payloads before delivering
# to receiver partners. Each consumer entry above references one profile.
#
# Rules:
#   - "*" means all fields (use for full_internal)
#   - List field names explicitly for restricted profiles
#   - Only list models that receiver partners are allowed to receive
#   - Fields not listed are stripped from the payload before delivery
# =============================================================================
export_profile_definitions:

  full_internal:
    # TwinCE Platform — receives everything, no filtering
    digital_product_passport: "*"
    product: "*"
    material: "*"
    material_composition: "*"
    energy_consumption: "*"
    scope1_fuel: "*"
    scope2_electricity: "*"
    scope3_material: "*"
    scope3_transport: "*"
    pcf_aggregation: "*"
    data_carrier: "*"

  customer_exchange_minimum:
    # Buyer partner — minimum fields required for supply chain compliance and ESPR
    digital_product_passport:
      - product_id
      - batch_id
      - material_no
      - spec_standard
      - manufacturing_country
      - recycled_content_post_consumer
      - hazardous_substances        # REACH/SCIP legal requirement
      - pcf_cradle_to_gate          # buyer's Scope 3 reporting
      - release_status              # quality approval confirmation
      - data_carrier_url            # ESPR registry link
      - timestamp
    product:
      - product_id
      - batch_id
      - material_no
      - spec_standard
      - manufacturing_country
      - timestamp

  supplier_exchange_minimum:
    # Upstream supplier — what they need to know about how their material was used
    digital_product_passport:
      - product_id
      - batch_id
      - material_no
      - recycled_content_post_consumer
      - recycled_content_pre_consumer
      - pcf_cradle_to_gate
      - timestamp

  public_dpp_view:
    # Public / regulators / research — anonymized, no internal identifiers
    digital_product_passport:
      - material_no
      - spec_standard
      - manufacturing_country
      - recycled_content_post_consumer
      - hazardous_substances
      - pcf_cradle_to_gate
      - data_carrier_url
      - timestamp

servers:
  production:
    type: kafka
    host: app.twince.de:9092, app.twince.de:9093, app.twince.de:9095
    format: json
    security: SASL_SSL

terms:
  license: CC-BY-NC-4.0
  confidentiality: internal_partners
  retention:
    raw_data_months: 24
    aggregated_data_months: 36
  usage: >
    Data for sustainability reporting, process optimization,
    and Digital Product Passport within TwinCE consortium only.

# =============================================================================
# MODELS — One block per data topic. Delete what the partner cannot send.
# =============================================================================
models:

  # ─────────────────────────────────────────────────────────────────────
  # ORDER
  # ─────────────────────────────────────────────────────────────────────
  order:
    topic: <partner>_order
    description: Customer orders
    type: object
    kg_node: Order
    required:
      - order_id
      - timestamp
    fields:
      order_id:
        type: string
        description: Unique order identifier
      position:
        type: string
        description: Position number within order
        nullable: true
      customer_id:
        type: string
        description: Customer identifier
        nullable: true
      timestamp:
        type: string
        format: date-time
        description: When the order was placed

  # ─────────────────────────────────────────────────────────────────────
  # PRODUCT
  # ─────────────────────────────────────────────────────────────────────
  product:
    topic: <partner>_product
    description: Finished or semi-finished product linked to batch and order
    type: object
    kg_node: Product
    required:
      - product_id
      - batch_id
      - material_no
    fields:
      product_id:
        type: string
        description: Unique product identifier
      batch_id:
        type: string
        description: Production batch this product belongs to
      order_id:
        type: string
        description: Order this product fulfills
        nullable: true
      material_no:
        type: string
        description: Material/alloy number (e.g. CuZn39Pb3)
      spec_standard:
        type: string
        description: Applicable norm (e.g. EN 12164)
        nullable: true
      mass_kg:
        type: number
        format: float
        description: Product mass in kg
        unit: kg
        nullable: true
      site_id:
        type: string
        description: Manufacturing site identifier
        nullable: true
      pcf_cradle_to_gate:
        type: number
        format: float
        description: Product carbon footprint cradle-to-gate
        unit: kgCO2e
        nullable: true
      timestamp:
        type: string
        format: date-time
        description: Manufacturing timestamp

  # ─────────────────────────────────────────────────────────────────────
  # MATERIAL
  # ─────────────────────────────────────────────────────────────────────
  material:
    topic: <partner>_material
    description: Material/alloy master data
    type: object
    kg_node: Material
    required:
      - material_no
    fields:
      material_no:
        type: string
        description: Internal material number
      material_name:
        type: string
        description: Human-readable name
        nullable: true
      category:
        type: string
        description: Material category (e.g. Messing, Kupfer, Aluminium)
        nullable: true
      density_g_per_cm3:
        type: number
        format: float
        description: Density in g/cm3
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # MATERIAL COMPOSITION
  # ─────────────────────────────────────────────────────────────────────
  material_composition:
    topic: <partner>_material_composition
    description: >
      Chemical composition in mass percent, keyed by CAS number.
      Per DPPO dpp-comp — describes the substance-level breakdown of a material.
      Each component (identified by CAS number) becomes a ChemicalProperty node
      linked to the parent Material node via IS_COMPOSED_OF.
      Note: ChemicalProperty is the existing Neo4j label (DPPO equivalent: CompositionInformation).
    type: object
    kg_node: ChemicalProperty
    required:
      - material_no
      - components
    fields:
      material_no:
        type: string
        description: Reference to material (links to Material node in KG)
      components:
        type: object
        description: >
          Keys are CAS numbers (e.g. 7440-50-8 for Cu).
          Values are mass fractions in percent.
          Components matching REACH/SCIP lists will be linked to SubstanceOfConcern nodes.

  # ─────────────────────────────────────────────────────────────────────
  # ENERGY CONSUMPTION
  # ─────────────────────────────────────────────────────────────────────
  energy_consumption:
    topic: <partner>_energy_consumption
    description: Energy consumption per machine or process step in kWh
    type: object
    kg_node: MachineEnergyDaily
    required:
      - machine_id
      - timestamp
      - consumption_kwh
    fields:
      machine_id:
        type: string
        description: Machine or process step identifier
      timestamp:
        type: string
        format: date-time
        description: Measurement timestamp
      consumption_kwh:
        type: number
        format: float
        description: Energy consumed in kWh
        unit: kWh
      batch_id:
        type: string
        description: Batch being processed
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # EMISSION FACTOR
  # ─────────────────────────────────────────────────────────────────────
  emission_factor:
    topic: <partner>_emission_factor
    description: CO2 emission factors with source and validity
    type: object
    kg_node: EmissionFactor
    required:
      - ef_id
      - category
      - value
      - source
    fields:
      ef_id:
        type: string
        description: Unique factor identifier (e.g. EF-MESSING)
      scope:
        type: string
        description: GHG scope (S1, S2-location, S2-market, S3)
      category:
        type: string
        description: Category (electricity, fuel, material, transport)
      value:
        type: number
        format: float
        description: Factor value in kgCO2e per unit
        unit: kgCO2e
      source:
        type: string
        description: Source (e.g. BAFA, Ecoinvent, UBA)
      valid_from:
        type: string
        format: date
        description: Start of validity
      valid_to:
        type: string
        format: date
        description: End of validity
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # SCOPE 1 — Direct fuel emissions
  # ─────────────────────────────────────────────────────────────────────
  scope1_fuel:
    topic: <partner>_scope1_fuel
    description: Direct emissions from fuels (Scope 1)
    type: object
    kg_node: Scope1FuelRecord
    required:
      - site_id
      - period
      - fuel_type
      - energy_kwh
      - ef_id
    fields:
      site_id:
        type: string
        description: Site identifier
      period:
        type: string
        description: Reporting period (YYYY-MM)
      fuel_type:
        type: string
        description: Fuel type (e.g. Erdgas, Diesel)
      energy_kwh:
        type: number
        format: float
        description: Energy input in kWh
        unit: kWh
      ef_id:
        type: string
        description: Reference to emission factor
      emissions_kgco2e:
        type: number
        format: float
        description: Calculated emissions
        unit: kgCO2e
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # SCOPE 2 — Electricity emissions
  # ─────────────────────────────────────────────────────────────────────
  scope2_electricity:
    topic: <partner>_scope2_electricity
    description: Indirect emissions from purchased electricity (Scope 2)
    type: object
    kg_node: Scope2ElectricityRecord
    required:
      - site_id
      - period
      - consumption_kwh
      - ef_id
    fields:
      site_id:
        type: string
        description: Site identifier
      period:
        type: string
        description: Reporting period (YYYY-MM)
      consumption_kwh:
        type: number
        format: float
        description: Electricity consumed in kWh
        unit: kWh
      method:
        type: string
        description: Calculation method (location_based or market_based)
        nullable: true
      ef_id:
        type: string
        description: Reference to emission factor
      emissions_kgco2e:
        type: number
        format: float
        description: Calculated emissions
        unit: kgCO2e
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # SCOPE 3 — Upstream material emissions
  # ─────────────────────────────────────────────────────────────────────
  scope3_material:
    topic: <partner>_scope3_material
    description: Upstream emissions from purchased materials (Scope 3 Cat.1)
    type: object
    kg_node: Scope3MaterialRecord
    required:
      - supplier_id
      - material_no
      - mass_kg
      - ef_id
    fields:
      purchase_order:
        type: string
        description: Purchase order number
        nullable: true
      supplier_id:
        type: string
        description: Supplier identifier
      material_no:
        type: string
        description: Material number
      mass_kg:
        type: number
        format: float
        description: Mass in kg
        unit: kg
      country_of_origin:
        type: string
        description: Country of origin
        nullable: true
      recycled_content_pct:
        type: number
        format: float
        description: Recycled content in percent
        unit: "%"
        nullable: true
      ef_id:
        type: string
        description: Reference to emission factor
      emissions_kgco2e:
        type: number
        format: float
        description: Calculated emissions
        unit: kgCO2e
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # SCOPE 3 — Transport emissions
  # ─────────────────────────────────────────────────────────────────────
  scope3_transport:
    topic: <partner>_scope3_transport
    description: Transport emissions (Scope 3 Cat.4/9)
    type: object
    kg_node: Scope3TransportRecord
    required:
      - mode
      - distance_km
      - ef_id
    fields:
      shipment_id:
        type: string
        description: Shipment identifier
        nullable: true
      order_id:
        type: string
        description: Related order
        nullable: true
      mode:
        type: string
        description: Transport mode (truck, rail, ship, air)
      distance_km:
        type: number
        format: float
        description: Distance in km
        unit: km
      ef_id:
        type: string
        description: Reference to emission factor
      emissions_kgco2e:
        type: number
        format: float
        description: Calculated emissions
        unit: kgCO2e
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # PCF AGGREGATION
  # ─────────────────────────────────────────────────────────────────────
  pcf_aggregation:
    topic: <partner>_pcf_aggregation
    description: Aggregated PCF per batch linking Scope 1+2+3 to product
    type: object
    kg_node: PCFAggregation
    required:
      - batch_id
      - site_id
      - pcf_kgco2e_per_kg
    fields:
      batch_id:
        type: string
        description: Batch identifier
      site_id:
        type: string
        description: Manufacturing site
      period:
        type: string
        description: Period (YYYY-MM)
        nullable: true
      scope1_total:
        type: number
        format: float
        description: Total Scope 1 emissions
        unit: kgCO2e
        nullable: true
      scope2_total:
        type: number
        format: float
        description: Total Scope 2 emissions
        unit: kgCO2e
        nullable: true
      scope3_total:
        type: number
        format: float
        description: Total Scope 3 emissions
        unit: kgCO2e
        nullable: true
      pcf_kgco2e_per_kg:
        type: number
        format: float
        description: PCF per kg product
        unit: kgCO2e/kg

  # ─────────────────────────────────────────────────────────────────────
  # DIGITAL PRODUCT PASSPORT
  # ─────────────────────────────────────────────────────────────────────
  digital_product_passport:
    topic: <partner>_dpp
    description: >
      Digital Product Passport (DPP) per EU ESPR Regulation 2024/1781 (Articles 9-10).
      This is the information layer *about* a product, not the product itself.
      Per DPPO (dpp-odp:describes): (DigitalProductPassport)-[:DESCRIBES]->(Product).
      The DPP is mandatory for ESPR product categories from 2027.
      It covers all 12 Annex III data element categories: identity, composition,
      performance, sustainability, circularity, supply chain, compliance, etc.
    type: object
    kg_node: DigitalProductPassport
    required:
      - product_id
      - material_no
      - pcf_cradle_to_gate
    fields:
      product_id:
        type: string
        description: >
          Unique product identifier. Used as the link to the Product node in KG.
          Per ESPR Annex III: Unique Product Identifier (UPI).
      gtin:
        type: string
        description: Global Trade Item Number (GS1 standard; ESPR Annex III category 1)
        nullable: true
      batch_id:
        type: string
        description: Batch / charge number (ESPR Annex III — traceability)
        nullable: true
      material_no:
        type: string
        description: Material/alloy number (links to Material node; ESPR Annex III category 3 — composition)
      spec_standard:
        type: string
        description: >
          Applicable standard (e.g. EN 12164).
          In KG: (DigitalProductPassport)-[:CERTIFIES_AGAINST]->(Standard).
          Per DPPO dpp-core, ESPR Article 9(1)(a).
        nullable: true
      manufacturing_site:
        type: string
        description: Manufacturing site identifier (ESPR Annex III — supply chain information)
        nullable: true
      manufacturing_country:
        type: string
        description: Manufacturing country (ISO 3166-1 alpha-2; ESPR Annex III — origin)
        nullable: true
      hazardous_substances:
        type: array
        description: >
          Substances of concern per REACH/SCIP (CAS numbers or substance IDs).
          Per DPPO dpp-comp:SubstanceOfConcern, ESPR Article 9(1)(i).
          In KG: (DigitalProductPassport)-[:CONTAINS_SUBSTANCE_OF_CONCERN]->(SubstanceOfConcern).
          Must include all SVHC (Substances of Very High Concern) above 0.1% w/w.
        nullable: true
      pcf_cradle_to_gate:
        type: number
        format: float
        description: >
          Product Carbon Footprint cradle-to-gate in kgCO2e per kg.
          Per ISO 14067, Catena-X PCF Rulebook, ESPR Annex III category 4.
        unit: kgCO2e
      pcf_breakdown:
        type: object
        description: PCF split by scope (Scope1, Scope2, Scope3) per GHG Protocol
        nullable: true
      data_carrier_url:
        type: string
        format: uri
        description: >
          URL pointing to the DPP registry entry.
          Per ESPR Article 9(1)(r): a data carrier (QR code, RFID, URL) must be
          permanently attached to the product or packaging.
          In KG: (DigitalProductPassport)-[:ACCESSED_VIA]->(DataCarrier).
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # DATA CARRIER  (ESPR Article 9(1)(r) — required from 2027)
  # ─────────────────────────────────────────────────────────────────────
  data_carrier:
    topic: <partner>_data_carrier
    description: >
      Physical or digital data carrier that provides access to the DPP.
      Per ESPR 2024/1781 Article 9(1)(r): a data carrier must be permanently
      attached to or printed on the product or its packaging, enabling
      consumers and authorities to access the full DPP.
      Supported types: QR code (recommended), RFID, NFC, URL.
      In KG: (DigitalProductPassport)-[:ACCESSED_VIA]->(DataCarrier).
    type: object
    kg_node: DataCarrier
    required:
      - product_id
      - carrier_type
      - carrier_url
    fields:
      product_id:
        type: string
        description: Product this carrier is attached to
      carrier_type:
        type: string
        description: Carrier technology (qr_code, rfid, nfc, url, gs1_digital_link)
      carrier_url:
        type: string
        format: uri
        description: >
          Permanent URL resolving to the DPP registry entry.
          Must remain accessible for 10 years per ESPR Article 9(2)(a).
      carrier_id:
        type: string
        description: Unique carrier identifier (e.g. RFID chip ID, QR code hash)
        nullable: true
      issued_date:
        type: string
        format: date
        description: Date the carrier was issued / printed
        nullable: true

  # ─────────────────────────────────────────────────────────────────────
  # ADD PARTNER-SPECIFIC MODELS BELOW
  # ─────────────────────────────────────────────────────────────────────
  # If the partner sends data that does not fit any model above,
  # add a new model here. Set kg_node: null if it is lakehouse only.
  #
  # Example:
  #
  # sawing_details:
  #   topic: bkm_sawing_details
  #   description: Sawing-specific production parameters
  #   type: object
  #   kg_node: null
  #   required:
  #     - product_id
  #   fields:
  #     product_id:
  #       type: string
  #       description: Reference to product
  #     cut_length:
  #       type: number
  #       format: float
  #       description: Total cutting length in mm
  #       unit: mm

# =============================================================================
# QUALITY
# =============================================================================
quality:
  schema_validation:
    enabled: true
    reject_invalid: true
    log_violations: true
  rules:
    - field: timestamp
      rule: valid_datetime
      severity: error
    - field: "*_id"
      rule: not_null
      severity: error

# =============================================================================
# EXAMPLES — Add at least one example per model for testing
# =============================================================================
examples:
  - model: product
    description: Example product
    data:
      product_id: "PROD-2025-0001"
      batch_id: "CHG-2025-0001"
      order_id: "ORD-2025-0001"
      material_no: "CuZn39Pb3"
      timestamp: "2025-06-15T14:30:00Z"

  - model: material_composition
    description: Example brass composition
    data:
      material_no: "CuZn39Pb3"
      components:
        "7440-50-8": 59.5
        "7440-66-6": 37.0
        "7439-92-1": 3.0
